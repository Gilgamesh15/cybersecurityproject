        <main class="pfy-main">
            <section class="content">
                <header class="pfy-header">
            <img src="https://pipestyle.staticpipefy.com/default/images/logo-black.svg" alt="Pipefy">
            <h1 id="kc-page-title">
                Welcome back
            </h1>
                </header>
                <main id="kc-content">
                    <div id="kc-content-wrapper" class="m-0">

                <div id="kc-form">
                    <div id="kc-form-wrapper">
                            <form id="kc-form-login" onsubmit="login.disabled = true; return true;" action="https://signin.pipefy.com/realms/pipefy/login-actions/authenticate?session_code=muG94fKCbsX9D-MqTJqx79bgwY7uNVmPAEjy0HSnYuw&amp;execution=6ae0f6ff-69ea-4bcb-a316-39d6e23dd56d&amp;client_id=pipefy-auth&amp;tab_id=fxlHkClcjtA" method="post">
                                    <div class="pfy-form-control mb-24">
                                        <label for="username" class="" >
                                            Email or username
                                        </label>

                                        <input tabindex="1" id="username"
                                            name="username" value=""
                                            type="text" autofocus autocomplete="off"
                                            aria-invalid=""
                                            placeholder="email@company.com"
                                            data-invalid="" />

                                    </div>
                                <div id="kc-form-buttons" class="form-group">
                                    <input type="hidden" id="id-hidden-input" name="credentialId" />
                        <button tabindex="4" class="pfy-button button-is-filled w-100" name="login" id="kc-login" type="submit" form="kc-form-login" onclick="changeButtonLoadingState(event)">
                           <div class="pfy-spinner">
                                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" />
                                </svg>
                           </div>
                           Continue
                        </button>
                    </div>
                    </form>
        </div>

                    </div>
                </div>
                    <div id="kc-social-providers" class="kc-social-section kc-social-gray mt-16">
                        <hr />
                        <div class="pfy-social-divider-container">
                            <h4 class="pfy-social-divider-text">
                                or continue with
                            </h4>
                        </div>
                        <ul class="display-flex-column gap-600 pf-c-login__main-footer-links kc-social-links
">

                                        <img src="/resources/wuk6r/login/pipefy/img/google.svg" aria-hidden="true" onerror="this.style.display='none'" />
                                    </div>
                                    <span class="kc-social-provider-name">
                                        Log in with Google
                                    </span>
                                </a>
                                <a id="social-apple" class="pfy-button button-is-outlined apple w-100 "
                                    type="button" href="/realms/pipefy/broker/apple/login?client_id=pipefy-auth&amp;tab_id=fxlHkClcjtA&amp;session_code=muG94fKCbsX9D-MqTJqx79bgwY7uNVmPAEjy0HSnYuw">

        <script>
            function changeButtonLoadingState(event) {
                const button = event.target;
                button.classList.add('button-is-loading');
                button.classList.remove('button-is-filled');
            }
        </script>
